name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify app-builder binary
        shell: powershell
        run: |
          if (-not (Test-Path ".\node_modules\app-builder-bin\win\x64\app-builder.exe")) {
            throw "app-builder.exe was not installed in the workspace root."
          }

      - name: Install processor build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r processor/requirements.txt pyinstaller

      - name: Build Windows installer
        run: npm run package

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: karaokeai-windows-installer
          path: desktop/release/*.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
